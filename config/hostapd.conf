# RetroBox — hostapd configuration
# Creates the "RetroBox" Wi-Fi access point that phones connect to.
#
# Apply:
#   sudo cp config/hostapd.conf /etc/hostapd/hostapd.conf
#   sudo systemctl enable --now hostapd

# Wireless interface that will act as the access point
interface=wlan0

# 802.11n on the 2.4 GHz band (maximum compatibility with phones)
driver=nl80211
hw_mode=g
ieee80211n=1
wmm_enabled=1

# Channel 6 is a safe default — change if your environment is congested
channel=6

# SSID broadcast — no passphrase (open network for easy phone connection)
ssid=RetroBox
ignore_broadcast_ssid=0

# Open authentication (no WPA) — easiest for a captive-portal flow
auth_algs=1
wpa=0

# Country code — update to match your region (required for 5 GHz operation)
country_code=US
