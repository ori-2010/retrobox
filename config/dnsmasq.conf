# RetroBox — dnsmasq configuration
# Provides DHCP leases and DNS redirection so that phones auto-open
# the controller page (captive-portal style) when they join the Wi-Fi.
#
# Apply:
#   sudo cp config/dnsmasq.conf /etc/dnsmasq.d/retrobox.conf
#   sudo systemctl enable --now dnsmasq

# Only listen on the AP interface — do not touch the upstream network
interface=wlan0
bind-interfaces

# DHCP: hand out addresses in the 10.0.0.x range
# Lease time 1h is fine for a gaming session
dhcp-range=10.0.0.10,10.0.0.50,255.255.255.0,1h

# Default gateway and DNS point back to this machine (10.0.0.1)
dhcp-option=3,10.0.0.1
dhcp-option=6,10.0.0.1

# Captive-portal DNS redirect:
#   Resolve every hostname (wildcard) to the RetroBox server so phones
#   automatically detect a captive portal and open the browser.
address=/#/10.0.0.1

# Do NOT forward DNS queries upstream (self-contained network)
no-resolv
